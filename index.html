<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chris's little archive</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Door Screen -->
  <section id="door-screen" class="door-screen">
    <div class="door-wrap">
      <div class="door" id="door">
        <div class="door-sign">Chris’s little archive</div>
        <div class="door-knob"></div>
      </div>

      <button id="knock-btn" class="knock-btn">
        knock knock ♡
      </button>

      <p class="door-note">
        a soft little room for photos, songs, travels, meals, and tiny thoughts
      </p>
    </div>
  </section>

  <!-- Room Screen -->
  <main id="room-screen" class="room-screen hidden">
    <div class="room">

      <!-- window -->
      <div class="window">
        <div class="blinds"></div>
        <p>outside world</p>
      </div>

      <!-- photo board -->
      <button class="hotspot photo-board" data-modal="photos">
        <span>photo board</span>
        <div class="mini-photo one"></div>
        <div class="mini-photo two"></div>
        <div class="mini-photo three"></div>
      </button>

      <!-- desk -->
      <button class="hotspot desk" data-modal="travel">
        <div class="journal">travel journal</div>
      </button>

      <!-- wardrobe -->
      <button class="hotspot wardrobe" data-modal="closet">
        <span>closet</span>
      </button>

      <!-- bed -->
      <div class="bed">
        <button class="hotspot girl" data-modal="playlist">
          <span class="girl-head"></span>
          <span class="girl-body"></span>
          <span class="headphone">♪</span>
        </button>

        <button class="thought-bubble" data-modal="thoughts">
          lately...
        </button>
      </div>

      <h1 class="room-title">Chris’s little room</h1>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="close-modal" class="close-btn">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
