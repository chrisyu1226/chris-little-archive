<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chris' Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&family=Love+Light&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Caudex", serif;
      background: #eeeeee;
    }

    .site {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ===== Fullscreen entrance ===== */

    .entrance {
      background: #eeeeee;
      overflow: hidden;
      z-index: 2;
    }

    /* 左右墙面透视 */
    .entrance::before,
    .entrance::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .entrance::before {
      left: 0;
      background: linear-gradient(
        38deg,
        transparent 0%,
        transparent 57%,
        rgba(218, 218, 218, 0.38) 57.3%,
        rgba(218, 218, 218, 0.08) 100%
      );
    }

    .entrance::after {
      right: 0;
      background: linear-gradient(
        -38deg,
        transparent 0%,
        transparent 57%,
        rgba(218, 218, 218, 0.38) 57.3%,
        rgba(218, 218, 218, 0.08) 100%
      );
    }

    .title {
      position: absolute;
      top: 5.5vh;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      z-index: 8;

      font-family: "Love Light", cursive;
      font-size: clamp(70px, 8vw, 120px);
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;

      color: #b9d9f2;
      opacity: 0.92;
      text-shadow:
        0 2px 1px rgba(255, 255, 255, 0.85),
        0 0 8px rgba(185, 217, 242, 0.5);
      pointer-events: none;
    }

    /* ===== Door ===== */

    .door-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -42%);

      width: clamp(230px, 21vw, 340px);
      height: clamp(390px, 56vh, 560px);

      z-index: 6;
      perspective: 1300px;
      cursor: pointer;
    }

    .portal {
      position: absolute;
      inset: 0;
      background: #000;
      border: clamp(10px, 1vw, 14px) solid #ffffff;
      z-index: 1;
      opacity: 0;
      transform-origin: center center;
    }

    .door {
      position: absolute;
      inset: 0;
      padding: 0;
      margin: 0;

      border: clamp(10px, 1vw, 14px) solid #ffffff;
      background: transparent;
      cursor: pointer;
      z-index: 3;

      transform-origin: left center;
      transform-style: preserve-3d;
      appearance: none;
    }

    .door-panel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;

      border-radius: 24px;

      background:
        radial-gradient(circle at 32% 25%, rgba(255, 255, 255, 0.68), transparent 38%),
        linear-gradient(145deg, #dff1fd 0%, #c3e0f4 66%, #b8d9f2 100%);

      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.58),
        inset 0 0 16px rgba(120, 165, 200, 0.12);
    }

    .star {
      position: absolute;
      left: 47%;
      top: 51%;

      width: 74%;
      aspect-ratio: 1;

      transform: translate(-50%, -50%) rotate(-7deg);
      background: #fff1a3;

      clip-path: polygon(
        50% 0%,
        60% 36%,
        88% 20%,
        70% 52%,
        88% 90%,
        50% 67%,
        14% 94%,
        30% 55%,
        8% 22%,
        40% 38%
      );

      filter:
        drop-shadow(0 2px 2px rgba(120, 105, 40, 0.16))
        drop-shadow(0 0 8px rgba(255, 242, 160, 0.35));

      z-index: 2;
      pointer-events: none;
    }

    .knock {
      position: absolute;
      right: 7.5%;
      top: 47%;

      z-index: 4;

      font-family: "Caudex", serif;
      font-size: clamp(14px, 1.3vw, 20px);
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 2px rgba(120, 120, 120, 0.25);

      pointer-events: none;
    }

    .knob {
      position: absolute;
      right: 5.5%;
      top: 50.5%;

      width: clamp(16px, 1.5vw, 23px);
      height: clamp(16px, 1.5vw, 23px);

      border-radius: 50%;
      background: #ffffff;

      box-shadow:
        3px 4px 6px rgba(90, 90, 90, 0.24),
        inset -2px -2px 3px rgba(190, 190, 190, 0.18);

      z-index: 5;
      pointer-events: none;
    }

    /* ===== Fullscreen floor ===== */

    .floor {
      position: absolute;
      left: 0;
      bottom: 0;

      width: 100vw;
      height: 33vh;

      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.96),
        rgba(255, 255, 255, 1)
      );

      clip-path: polygon(
        41% 0%,
        59% 0%,
        100% 100%,
        0% 100%
      );

      z-index: 2;
      pointer-events: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 6vh;
      transform: translateX(-50%);

      z-index: 9;
      margin: 0;

      font-family: "Caudex", serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: rgba(160, 180, 195, 0.55);

      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .entrance:hover .hint {
      opacity: 1;
    }

    /* ===== Animation ===== */

    .entrance.entering .door {
      animation: doorOpen 1.05s cubic-bezier(.2, .85, .18, 1) forwards;
    }

    .entrance.entering .portal {
      opacity: 1;
      animation: portalZoom 1.55s cubic-bezier(.35, 0, .2, 1) 0.28s forwards;
    }

    .entrance.entering .title {
      animation: fadeTitle 0.9s ease forwards;
    }

    .entrance.entering .hint {
      opacity: 0;
    }

    .entrance.entering .knock {
      animation: fadeOut 0.45s ease forwards;
    }

    @keyframes doorOpen {
      0% {
        transform: rotateY(0deg);
      }

      100% {
        transform: rotateY(-82deg) translateX(-8px);
      }
    }

    @keyframes portalZoom {
      0% {
        transform: scale(1);
        filter: blur(0);
      }

      45% {
        transform: scale(1.3);
        filter: blur(0);
      }

      100% {
        transform: scale(12);
        filter: blur(4px);
      }
    }

    @keyframes fadeTitle {
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    /* ===== Black transition ===== */

    .black-transition {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.65s ease;
    }

    .black-transition.show {
      opacity: 1;
    }

    /* ===== Room page ===== */

    .room {
      display: none;
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.9), transparent 36%),
        linear-gradient(180deg, #f8f5ef 0%, #eef6fb 100%);
      color: #7c94aa;
      z-index: 1;
    }

    .room.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: roomAppear 1.1s ease forwards;
    }

    .room-inner {
      text-align: center;
      transform: translateY(12px);
      opacity: 0;
      animation: floatIn 1.2s ease 0.25s forwards;
    }

    .room h2 {
      margin: 0;
      font-family: "Love Light", cursive;
      font-size: clamp(76px, 9vw, 138px);
      font-weight: 400;
      color: #b9d9f2;
      text-shadow: 0 2px 2px rgba(255, 255, 255, 0.85);
    }

    .room p {
      margin: 8px 0 30px;
      font-size: 20px;
      color: rgba(90, 115, 135, 0.72);
    }

    .room-items {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .room-item {
      padding: 18px 24px;
      min-width: 150px;
      border-radius: 20px;
      border: 1px solid rgba(185, 217, 242, 0.65);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 12px 30px rgba(120, 145, 165, 0.12);
    }

    @keyframes roomAppear {
      from {
        opacity: 0;
        filter: blur(14px);
      }

      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes floatIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Mobile ===== */

    @media (max-width: 700px) {
      .title {
        top: 8vh;
        font-size: 68px;
      }

      .door-wrap {
        width: 48vw;
        height: 58vh;
        transform: translate(-50%, -37%);
      }

      .floor {
        height: 32vh;
        clip-path: polygon(
          29% 0%,
          71% 0%,
          100% 100%,
          0% 100%
        );
      }

      .hint {
        bottom: 7vh;
      }
    }
  </style>
</head>

<body>
  <main class="site">

    <section class="scene entrance" id="entrance">
      <h1 class="title">Chris’ Room</h1>

      <div class="door-wrap" id="doorWrap">
        <div class="portal"></div>

        <button class="door" id="enterButton" type="button" aria-label="Knock and enter Chris' Room">
          <div class="door-panel">
            <div class="star"></div>
            <span class="knock">KNOCK</span>
            <span class="knob"></span>
          </div>
        </button>
      </div>

      <div class="floor"></div>
      <p class="hint">click to knock</p>
    </section>

    <section class="scene room" id="room">
      <div class="room-inner">
        <h2>Welcome in</h2>
        <p>this is where tiny feelings stay.</p>

        <div class="room-items">
          <div class="room-item">record player</div>
          <div class="room-item">places</div>
          <div class="room-item">tiny thoughts</div>
        </div>
      </div>
    </section>

    <div class="black-transition" id="blackTransition"></div>

  </main>

  <script>
    const entrance = document.getElementById("entrance");
    const room = document.getElementById("room");
    const enterButton = document.getElementById("enterButton");
    const doorWrap = document.getElementById("doorWrap");
    const blackTransition = document.getElementById("blackTransition");

    let entered = false;

    function enterRoom() {
      if (entered) return;
      entered = true;

      entrance.classList.add("entering");

      setTimeout(() => {
        blackTransition.classList.add("show");
      }, 1150);

      setTimeout(() => {
        entrance.style.display = "none";
        room.classList.add("active");
      }, 1750);

      setTimeout(() => {
        blackTransition.classList.remove("show");
      }, 2150);
    }

    enterButton.addEventListener("click", enterRoom);
    doorWrap.addEventListener("click", enterRoom);
  </script>
</body>
</html>
