<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chris' Room</title>

  <!-- Google Fonts: Love Light + Caudex -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&family=Love+Light&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="site">

    <!-- 开始页面：门 -->
    <section class="scene entrance" id="entrance">
      <h1 class="title">Chris’ Room</h1>

      <div class="door-wrap">
        <!-- 黑色门洞 / portal -->
        <div class="portal" id="portal"></div>

        <!-- 蓝色门 -->
        <button class="door" id="enterButton" aria-label="Knock and enter Chris' Room">
          <div class="door-panel">
            <div class="star"></div>
            <span class="knock">KNOCK</span>
            <span class="door-knob"></span>
          </div>
        </button>
      </div>

      <!-- 地板透视 -->
      <div class="floor"></div>

      <p class="hint">click to knock</p>
    </section>

    <!-- 进入后的房间页面 -->
    <section class="scene room" id="room">
      <div class="room-content">
        <h2>Welcome in ✨</h2>
        <p>This is Chris’ little room.</p>

        <div class="room-items">
          <div class="item">record player</div>
          <div class="item">tiny thoughts</div>
          <div class="item">places</div>
        </div>
      </div>
    </section>

    <!-- 黑屏过渡层 -->
    <div class="black-transition" id="blackTransition"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
